name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger on all version tags (e.g., v1.2.20, v1.2.21-beta, v1.2.21-rc.1)

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      # Detect if this tag is a pre-release (contains -beta, -alpha, -rc, etc.)
      - name: Set pre-release flag
        id: prerelease
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -(beta|alpha|rc|dev|preview) ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release build: $TAG"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "This is a stable release build: $TAG"
          fi

      - name: Build and Publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_PRE_RELEASE: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
        run: |
          npm run build
          npx electron-builder --mac --x64 --arm64 -p always

      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_PRE_RELEASE: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
        run: |
          npm run build
          node scripts/write-electron-config.cjs || true
          npx electron-builder --win -p always

