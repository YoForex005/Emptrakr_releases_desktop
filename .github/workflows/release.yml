name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger workflow on tags starting with v (e.g., v1.2.18)

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build and Publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Uses the Personal Access Token for the public repo
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          npx electron-builder --mac --x64 --arm64 -p always
          
      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Uses the Personal Access Token for the public repo
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          node scripts/write-electron-config.cjs || true
          npx electron-builder --win -p always
